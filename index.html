<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roeh 111 | Restoration Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">
                Roeh 111 <img src="assets/images/favicon.ico.png" alt="Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="theme-btn-wrapper">
                <button id="theme-toggle" class="theme-btn">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="slider-section">
            <h2 style="text-align: center; margin-bottom: 2rem;">Our Work in Pampa</h2>
            <div class="slider-container" id="main-slider">
                <div class="img-before">
                    <img src="assets/images/CxQk5.jpg" alt="Before" style="pointer-events: none;">
                    <div class="label label-before">Before</div>
                </div>
                <div class="img-after">
                    <img src="assets/images/lbrpw.jpg" alt="After" style="pointer-events: none;">
                    <div class="label label-after">After</div>
                </div>
            </div>
        </section>

        <section id="contact">
            <h2>Connect With Us</h2>
            <form action="https://formspree.io/f/your-id" method="POST">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" placeholder="Message" required></textarea>
                <button type="submit" class="btn">Send</button>
            </form>
        </section>
    </main>

    <button id="backToTop" class="back-to-top">↑</button>

    <script src="script.js"></script>
</body>
</html>
