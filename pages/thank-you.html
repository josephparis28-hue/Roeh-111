<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Success Checkmark Animation */
    .checkmark-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 3rem;
    }

    .checkmark {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: inline-block;
      border: 4px solid var(--accent);
      position: relative;
      animation: pop 0.4s ease-out forwards;
    }

    .checkmark::after {
      content: "";
      position: absolute;
      left: 26px;
      top: 45px;
      width: 20px;
      height: 40px;
      border-right: 4px solid var(--accent);
      border-bottom: 4px solid var(--accent);
      transform: rotate(45deg) scale(0);
      transform-origin: bottom left;
      animation: draw 0.4s ease-out 0.3s forwards;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      0% { transform: rotate(45deg) scale(0); }
      100% { transform: rotate(45deg) scale(1); }
    }
  </style>
</head>

<body>

<section class="fade-in" style="text-align:center; margin-top:5rem;">
  
  <div class="checkmark-wrapper">
    <div class="checkmark"></div>
  </div>

  <h1 style="margin-top:2rem;">Thank You!</h1>
  <p>Your message has been sent successfully. I’ll get back to you soon.</p>

  <a href="../index.html" class="contact-btn" style="margin-top:2rem; display:inline-block;">
    Return Home
  </a>

</section>

</body>
</html>
