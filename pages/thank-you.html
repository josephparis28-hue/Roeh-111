<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received | Roeh 111</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a href="../index.html" class="logo" style="color: white; text-decoration: none;">Roeh 111</a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="digital.html">Digital</a></li>
            <li><a href="home-repair.html">Repair</a></li>
            <li><a href="life.html">Life</a></li>
        </ul>
        <button id="theme-toggle" class="theme-btn" style="background: none; border: none; cursor: pointer; font-size: 1.5rem;">🌓</button>
    </div>
</nav>

<section style="max-width: 800px; margin: 6rem auto; padding: 0 1rem; text-align: center;">
    <h1 style="color: var(--accent-blue); font-size: 3rem; margin-bottom: 1rem;">Message Received</h1>
    <p style="font-size: 1.25rem; margin-bottom: 2rem;">
        Thank you for reaching out to Roeh 111. 
        We have received your inquiry and will review it with the attention and integrity it deserves. 
        Expect a response shortly.
    </p>
    
    <div style="margin-top: 3rem;">
        <a href="../index.html" class="btn" style="text-decoration: none; display: inline-block;">Return Home</a>
    </div>
</section>

<footer>
    <p style="text-align: center; padding: 2rem; opacity: 0.7;">&copy; 2026 Roeh 111 | Restoration in Progress</p>
</footer>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    if (localStorage.getItem('theme') === 'dark') { body.setAttribute('data-theme', 'dark'); }
    themeToggle.addEventListener('click', () => {
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    });
</script>

</body>
</html>
